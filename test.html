<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Gesture Gender Logic</title>
    <!-- โหลด TensorFlow.js และ Handpose Model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose"></script>
    <style>
        body {
            margin: 0;
            background: #121212;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            position: relative;
            border: 5px solid #333;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #video {
            transform: scaleX(-1); /* กลับด้านกล้องเหมือนกระจก */
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1);
        }
        #result-ui {
            margin-top: 20px;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 2rem;
            font-weight: bold;
            background: #222;
            transition: all 0.3s ease;
        }
        .male-theme { background: #007bff !important; box-shadow: 0 0 20px #007bff; }
        .female-theme { background: #e91e63 !important; box-shadow: 0 0 20px #e91e63; }
        .loading { font-size: 1.2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loading-text" class="loading">กำลังโหลด AI Hand Tracking...</div>
    
    <div class="container">
        <video id="video" width="640" height="480" autoplay></video>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>

    <div id="result-ui">รอสัญญาณมือ...</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultUI = document.getElementById('result-ui');
        const loadingText = document.getElementById('loading-text');

        let model;

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            return new Promise((resolve) => {
                video.onloadedmetadata = () => resolve(video);
            });
        }

        async function init() {
            model = await handpose.load();
            await setupCamera();
            video.play();
            loadingText.innerText = "ตรวจจับมือเรียบร้อย (ชู 1 นิ้ว = ชาย | ชู 2 นิ้ว = หญิง)";
            detect();
        }

        async function detect() {
            const predictions = await model.estimateHands(video);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (predictions.length > 0) {
                // วาดจุดบนนิ้วมือ
                predictions.forEach(prediction => {
                    const landmarks = prediction.landmarks;
                    for (let i = 0; i < landmarks.length; i++) {
                        const [x, y] = landmarks[i];
                        ctx.beginPath();
                        ctx.arc(x, y, 5, 0, 2 * Math.PI);
                        ctx.fillStyle = "#00ff00";
                        ctx.fill();
                    }

                    // วิเคราะห์จำนวนนิ้วที่ "ชู" (Logic แบบง่าย)
                    const fingersUp = checkFingers(landmarks);
                    updateUI(fingersUp);
                });
            } else {
                resultUI.innerText = "มองไม่เห็นมือ";
                resultUI.className = "";
            }

            requestAnimationFrame(detect);
        }

        function checkFingers(landmarks) {
            // นับนิ้วที่อยู่สูงกว่าข้อต่อโคนนิ้ว (Y น้อยกว่าคือสูงกว่า)
            let count = 0;
            const fingerTips = [8, 12, 16, 20]; // นิ้วชี้, กลาง, นาง, ก้อย
            const fingerBases = [6, 10, 14, 18];

            fingerTips.forEach((tip, idx) => {
                if (landmarks[tip][1] < landmarks[fingerBases[idx]][1]) {
                    count++;
                }
            });
            return count;
        }

        function updateUI(count) {
            if (count === 1) {
                resultUI.innerText = "เพศ: ชาย ♂";
                resultUI.className = "male-theme";
            } else if (count >= 2) {
                resultUI.innerText = "เพศ: หญิง ♀";
                resultUI.className = "female-theme";
            } else {
                resultUI.innerText = "ชูนนิ้วเพื่อเลือกเพศ";
                resultUI.className = "";
            }
        }

        init();
    </script>
</body>
</html>
