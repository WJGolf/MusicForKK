<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Gender Detection AI</title>
    <!-- โหลด face-api.js ผ่าน CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        canvas {
            position: absolute;
        }
        .video-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #444;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
        }
        #status {
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="status">กำลังโหลด AI Model...</div>
    <div class="video-container">
        <video id="video" width="720" height="560" autoplay muted></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');

        // รายชื่อ Model ที่ต้องใช้ (โหลดจาก GitHub ของผู้พัฒนาโดยตรง)
        const MODEL_URL = 'https://raw.githubusercontent.com/vladmandic/face-api/master/model/';

        async function init() {
            try {
                // 1. โหลด Models ทั้งหมด
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL)
                ]);
                
                statusText.innerText = "Model พร้อมใช้งาน! กำลังเปิดกล้อง...";
                startVideo();
            } catch (err) {
                statusText.innerText = "เกิดข้อผิดพลาดในการโหลด Model";
                console.error(err);
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    statusText.innerText = "ระบบกำลังวิเคราะห์...";
                })
                .catch(err => {
                    statusText.innerText = "ไม่สามารถเข้าถึงกล้องได้";
                    console.error(err);
                });
        }

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.querySelector('.video-container').append(canvas);
            
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                // 2. ตรวจจับและวิเคราะห์
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                    .withFaceLandmarks()
                    .withAgeAndGender();

                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                
                // ล้าง Canvas เก่า
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                // 3. วาดผลลัพธ์ลงบนหน้าจอ
                resizedDetections.forEach(result => {
                    const { gender, genderProbability, age } = result;
                    const genderTH = gender === 'male' ? 'ชาย' : 'หญิง';
                    const score = Math.round(genderProbability * 100);
                    
                    // วาดกล่องครอบหน้า
                    new faceapi.draw.DrawBox(result.detection.box, { 
                        label: `${genderTH} (${score}%)` 
                    }).draw(canvas);
                });
            }, 150); // วิเคราะห์ทุกๆ 0.15 วินาที
        });

        init();
    </script>
</body>
</html>
