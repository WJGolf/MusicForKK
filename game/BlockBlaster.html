<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Ultimate - Restart System</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #f72585;
            --bg: #0f0f1b;
            --accent: #4cc9f0;
        }
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            touch-action: manipulation;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            padding: 10px;
        }
        .canvas-area {
            position: relative;
            border: 4px solid var(--primary);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(67, 97, 238, 0.4);
        }
        canvas {
            display: block;
            background: var(--bg);
            max-width: 60vw;
            max-height: 50vh;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 100px;
        }
        .info-box {
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .info-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 20px; font-weight: bold; color: var(--accent); }
        
        #next-canvas {
            background: var(--bg);
            border-radius: 4px;
            margin-top: 5px;
        }

        /* Overlay Screens */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 8px;
            text-align: center;
            padding: 20px;
        }
        .overlay h2 { color: var(--secondary); margin: 0 0 10px 0; font-size: 28px; }
        .overlay p { margin: 5px 0; font-size: 18px; }
        
        .restart-btn {
            margin-top: 20px;
            background: var(--accent);
            border: none;
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .restart-btn:hover { transform: scale(1.1); }

        .speed-selector {
            background: #2b2b45;
            color: white;
            border: 1px solid var(--primary);
            padding: 6px;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
        }

        /* Controls */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            width: 95%;
            max-width: 380px;
        }
        .btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 18px;
            border-radius: 15px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 5px #1d2d7d;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px #1d2d7d; }
        .btn-pause { background: #ff9f43; box-shadow: 0 4px #c87f35; padding: 10px; font-size: 16px; }
        .btn-wide { grid-column: span 3; background: var(--secondary); box-shadow: 0 5px #a11856; font-size: 18px; font-weight: bold;}
    </style>
</head>
<body>

    <div id="game-container">
        <div class="canvas-area">
            <!-- หน้าจอหยุดเกม -->
            <div id="pause-overlay" class="overlay">
                <h2 style="color: var(--accent);">PAUSED</h2>
                <button class="restart-btn" onclick="togglePause()">RESUME</button>
            </div>

            <!-- หน้าจอแพ้เกม -->
            <div id="game-over-overlay" class="overlay">
                <h2>GAME OVER</h2>
                <p>คะแนนรอบนี้: <span id="final-score" style="color: var(--accent);">0</span></p>
                <p style="font-size: 14px; color: #888;">คะแนนสูงสุด: <span id="best-score">0</span></p>
                <button class="restart-btn" onclick="gameRestart()">PLAY AGAIN</button>
            </div>

            <canvas id="tetris" width="240" height="400"></canvas>
        </div>

        <div class="side-panel">
            <div class="info-box">
                <div class="info-label">ความเร็ว</div>
                <select id="speed-select" class="speed-selector">
                    <option value="1">Level 1</option>
                    <option value="2">Level 2</option>
                    <option value="3">Level 3</option>
                    <option value="5">Level 5</option>
                    <option value="10">Level 10</option>
                    <option value="15">Level 15</option>
                </select>
            </div>
            <div class="info-box">
                <div class="info-label">ถัดไป</div>
                <canvas id="next-canvas" width="60" height="60"></canvas>
            </div>
            <div class="info-box">
                <div class="info-label">คะแนน</div>
                <div id="score" class="info-value">0</div>
            </div>
            <button class="btn btn-pause" id="pause-btn">⏸ หยุด</button>
        </div>
    </div>

    <div class="controls-grid">
        <button class="btn" id="rotate-btn">↻</button>
        <button class="btn" id="up-btn">↑</button>
        <button class="btn" style="visibility: hidden;"></button>
        
        <button class="btn" id="left-btn">←</button>
        <button class="btn" id="down-btn">↓</button>
        <button class="btn" id="right-btn">→</button>
        
        <button class="btn btn-wide" id="drop-btn">HARD DROP (วางทันที)</button>
    </div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nextContext = nextCanvas.getContext('2d');
const speedSelect = document.getElementById('speed-select');

const SCALE = 20;
context.scale(SCALE, SCALE);
nextContext.scale(15, 15);

const colors = [null, '#4cc9f0', '#f72585', '#4895ef', '#f1c40f', '#ff4d6d', '#2ecc71', '#9b59b6'];

function createPiece(type) {
    if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
    if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
    if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
    if (type === 'O') return [[4,4],[4,4]];
    if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
    if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
}

function drawMatrix(matrix, offset, ctx) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                ctx.fillStyle = colors[value];
                ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                ctx.lineWidth = 0.05;
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

function draw() {
    context.fillStyle = '#0f0f1b';
    context.fillRect(0, 0, canvas.width / SCALE, canvas.height / SCALE);
    drawMatrix(arena, {x: 0, y: 0}, context);
    drawMatrix(player.matrix, player.pos, context);

    nextContext.fillStyle = '#0f0f1b';
    nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
    drawMatrix(player.next, {x: 1, y: 1}, nextContext);
}

function calculateInterval() {
    const lvl = parseInt(speedSelect.value);
    return 1000 * Math.pow(0.85, lvl - 1);
}

function playerReset() {
    const pieces = 'ILJOTSZ';
    player.matrix = player.next || createPiece(pieces[pieces.length * Math.random() | 0]);
    player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    if (collide(arena, player)) {
        gameOver();
    }
}

function playerDrop() {
    if (paused || isGameOver) return;
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateUI();
    }
    dropCounter = 0;
}

function gameOver() {
    isGameOver = true;
    if (player.score > highScore) {
        highScore = player.score;
        localStorage.setItem('tetrisHighScore', highScore);
    }
    document.getElementById('final-score').innerText = player.score;
    document.getElementById('best-score').innerText = highScore;
    document.getElementById('game-over-overlay').style.display = 'flex';
}

function gameRestart() {
    arena.forEach(row => row.fill(0));
    player.score = 0;
    isGameOver = false;
    document.getElementById('game-over-overlay').style.display = 'none';
    playerReset();
    updateUI();
}

function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;
        player.score += rowCount * 10;
        rowCount *= 2;
    }
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
        }
    }
    return false;
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
        });
    });
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
    }
    dir > 0 ? matrix.forEach(row => row.reverse()) : matrix.reverse();
}

function updateUI() {
    document.getElementById('score').innerText = player.score;
}

let dropCounter = 0;
let lastTime = 0;
let paused = false;
let isGameOver = false;
let highScore = localStorage.getItem('tetrisHighScore') || 0;

function update(time = 0) {
    if (!paused && !isGameOver) {
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > calculateInterval()) playerDrop();
        draw();
    } else {
        lastTime = time;
    }
    requestAnimationFrame(update);
}

function togglePause() {
    if (isGameOver) return;
    paused = !paused;
    document.getElementById('pause-overlay').style.display = paused ? 'flex' : 'none';
}

const arena = Array.from({length: 20}, () => new Array(12).fill(0));
const player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0 };

const handleInput = (key) => {
    if ((paused || isGameOver) && key !== 'p') return;
    if (key === 'left') { player.pos.x--; if(collide(arena, player)) player.pos.x++; }
    if (key === 'right') { player.pos.x++; if(collide(arena, player)) player.pos.x--; }
    if (key === 'down') playerDrop();
    if (key === 'rotate') {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, 1);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) { rotate(player.matrix, -1); player.pos.x = pos; return; }
        }
    }
    if (key === 'hard') {
        while(!collide(arena, player)) { player.pos.y++; }
        player.pos.y--;
        playerDrop();
    }
    if (key === 'p') togglePause();
};

document.addEventListener('keydown', e => {
    if (e.keyCode === 37) handleInput('left');
    if (e.keyCode === 39) handleInput('right');
    if (e.keyCode === 40) handleInput('down');
    if (e.keyCode === 38) handleInput('rotate');
    if (e.keyCode === 80) handleInput('p');
});

const bind = (id, k) => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(k); }, {passive: false});
    el.addEventListener('mousedown', (e) => { e.preventDefault(); handleInput(k); });
};

bind('left-btn', 'left'); bind('right-btn', 'right'); bind('down-btn', 'down');
bind('rotate-btn', 'rotate'); bind('up-btn', 'rotate'); bind('drop-btn', 'hard');
document.getElementById('pause-btn').onclick = () => handleInput('p');

playerReset();
updateUI();
update();
</script>
</body>
</html>
